<html lang="vi">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Candimate</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a30;
      --accent: #c8a96e;
      --accent2: #e8c99e;
      --text: #e8e6e0;
      --muted: #7a7870;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── NOISE TEXTURE ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.6;
    }

    /* ── HEADER ── */
    header {
      position: relative; z-index: 10;
      text-align: center;
      padding: 64px 24px 48px;
      border-bottom: 1px solid var(--border);
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease both;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 300;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 28px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .stat { text-align: center; }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--accent);
    }
    .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── TOOLBAR ── */
    .toolbar {
      position: relative; z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }

    .search-wrap {
      position: relative;
      flex: 1; max-width: 320px;
    }

    .search-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px 10px 42px;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    .count-badge {
      font-size: 13px;
      color: var(--muted);
    }
    .count-badge b { color: var(--accent); }

    /* ── GALLERY GRID ── */
    .gallery {
      position: relative; z-index: 10;
      columns: 4 220px;
      column-gap: 12px;
      padding: 32px 40px;
      gap: 12px;
    }

    .photo-card {
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--surface);
      animation: fadeIn 0.5s ease both;
    }

    .photo-card img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
    }

    .photo-card:hover img { transform: scale(1.04); }

    .photo-card .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 14px;
    }

    .photo-card:hover .overlay { opacity: 1; }

    .photo-name {
      font-size: 12px;
      color: #fff;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .photo-card.hidden { display: none; }

    /* ── EMPTY STATE ── */
    .empty {
      display: none;
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      grid-column: 1/-1;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      animation: fadeIn 0.2s ease;
    }
    #lightbox.active { display: flex; }

    .lb-img-wrap {
      position: relative;
      max-width: 92vw;
      max-height: 82vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lb-img {
      max-width: 92vw;
      max-height: 82vh;
      border-radius: 8px;
      object-fit: contain;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      animation: zoomIn 0.25s ease;
    }

    .lb-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 92vw;
      padding: 16px 0 0;
      gap: 12px;
    }

    #lb-name {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.08em;
      flex: 1;
    }

    #lb-counter {
      font-size: 13px;
      color: var(--muted);
    }

    .lb-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .lb-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    .lb-close {
      position: absolute;
      top: 20px; right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
    }
    .lb-close:hover { background: #e74c3c; border-color: #e74c3c; }

    .lb-nav {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(22,22,26,0.8);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    .lb-nav:hover { background: var(--accent); color: #000; }
    .lb-prev { left: -60px; }
    .lb-next { right: -60px; }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 10;
      text-align: center;
      padding: 32px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .gallery { padding: 16px; columns: 2 140px; }
      .toolbar { padding: 12px 16px; }
      .lb-prev { left: 4px; }
      .lb-next { right: 4px; }
    }
  </style>
</head>

// ──────────────────────────────────────────────────────────
// CANDIMATE CLOUD - NUX CLOUD
// ──────────────────────────────────────────────────────────

let currentIdx = 0;
let filtered = [...IMAGES];

function buildGallery(imgs) {
  const gallery = document.getElementById('gallery');
  const empty = document.getElementById('empty');
  const visCount = document.getElementById('visible-count');

  gallery.innerHTML = '';
  visCount.textContent = imgs.length;
  document.getElementById('total-count').textContent = IMAGES.length;

  if (imgs.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  imgs.forEach((img, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.style.animationDelay = `${Math.min(i * 0.03, 0.6)}s`;
    card.innerHTML = `
      <img src="${img.url}" alt="${img.name}" loading="lazy" />
      <div class="overlay"><span class="photo-name">${img.name}</span></div>
    `;
    card.addEventListener('click', () => openLb(i));
    gallery.appendChild(card);
  });
}

function openLb(idx) {
  currentIdx = idx;
  updateLb();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLb() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLb(dir) {
  currentIdx = (currentIdx + dir + filtered.length) % filtered.length;
  updateLb();
}

function updateLb() {
  const img = filtered[currentIdx];
  const el = document.getElementById('lb-img');
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = 'zoomIn 0.25s ease';
  el.src = img.url;
  el.alt = img.name;
  document.getElementById('lb-name').textContent = img.name;
  document.getElementById('lb-counter').textContent = `${currentIdx + 1} / ${filtered.length}`;
  const dl = document.getElementById('lb-download');
  dl.href = img.full || img.url;
  dl.download = img.name + '.jpg';
}

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  filtered = q ? IMAGES.filter(i => i.name.toLowerCase().includes(q)) : [...IMAGES];
  buildGallery(filtered);
});

// Keyboard nav
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') navLb(-1);
  if (e.key === 'ArrowRight') navLb(1);
});

// Click outside to close
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLb();
});

// Init
buildGallery(IMAGES);
</script>

<style>
  #music-btn {
    position: fixed;
    bottom: 28px; right: 28px;
    z-index: 999;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--accent);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #music-btn:hover { background: var(--accent); color: #000; transform: scale(1.1); }
  #music-btn svg { width: 20px; height: 20px; }
  #music-btn.playing::after {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    animation: pulse-ring 1.8s ease-out infinite;
    opacity: 0;
  }
  @keyframes pulse-ring {
    0%   { transform: scale(0.9); opacity: 0.6; }
    100% { transform: scale(1.5); opacity: 0; }
  }
</style>

<audio id="bg-audio" loop src="https://res.cloudinary.com/dlrax6e5x/video/upload/v1773074679/y0n5lbfghi8mj5iioahd.mp3"></audio>

<button id="music-btn" title="Bật / tắt nhạc" onclick="toggleMusic()">
  <svg id="icon-play" fill="currentColor" viewBox="0 0 24 24">
    <path d="M9 4l12 8-12 8V4z"/>
  </svg>
  <svg id="icon-pause" fill="currentColor" viewBox="0 0 24 24" style="display:none">
    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
  </svg>
</button>

<script>
  var audio = document.getElementById('bg-audio');
  var btn = document.getElementById('music-btn');
  var started = false;

  // Tự phát khi người dùng chạm/click lần đầu tiên vào trang
  function startOnFirstInteraction() {
    if (started) return;
    started = true;
    audio.play().then(function() {
      btn.classList.add('playing');
      document.getElementById('icon-play').style.display = 'none';
      document.getElementById('icon-pause').style.display = '';
    }).catch(function(){});
    document.removeEventListener('click', startOnFirstInteraction);
    document.removeEventListener('touchstart', startOnFirstInteraction);
  }
  document.addEventListener('click', startOnFirstInteraction);
  document.addEventListener('touchstart', startOnFirstInteraction);

  function toggleMusic() {
    if (audio.paused) {
      audio.play();
      btn.classList.add('playing');
      document.getElementById('icon-play').style.display = 'none';
      document.getElementById('icon-pause').style.display = '';
    } else {
      audio.pause();
      btn.classList.remove('playing');
      document.getElementById('icon-play').style.display = '';
      document.getElementById('icon-pause').style.display = 'none';
    }
  }
</script>
