<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Candimate</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/candimate/candimate.github.io/refs/heads/main/Candimate-Preview__1_-removebg-preview.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── INDEX PAGE ONLY ── */
    body { padding: 0; }

    /* HERO */
    .hero {
      text-align: center;
      padding: 64px 24px 48px;
      background: linear-gradient(135deg, #0d2b6b 0%, #1a7a9a 45%, #3bbfb0 75%, #f5d07a 100%);
      position: relative; overflow: hidden;
    }
    .hero::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(ellipse at 20% 50%, rgba(255,255,255,.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(255,255,255,.10) 0%, transparent 50%);
    }
    .hero::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:3px;
      background: linear-gradient(90deg,#0d2b6b,#1a7a9a,#3bbfb0,#f5d07a,#1a8fa0);
    }
    .hero-logo { width:56px; height:56px; object-fit:contain; filter:drop-shadow(0 4px 12px rgba(0,0,0,.25)); animation:fadeUp .5s .05s ease both; }
    .hero h1 {
      font-family:'Fraunces',serif; font-size:clamp(2rem,5vw,3.2rem);
      font-weight:700; color:#fff; margin-top:12px; animation:fadeUp .5s .1s ease both;
    }
    .hero p { color:rgba(255,255,255,.8); font-size:14px; margin-top:8px; animation:fadeUp .5s .2s ease both; }
    .hero-stats {
      display:flex; justify-content:center; gap:10px; margin-top:28px;
      animation:fadeUp .5s .3s ease both;
    }
    .hero-stat {
      text-align:center; background:rgba(255,255,255,.18); backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.3); border-radius:14px; padding:12px 24px;
    }
    .hero-stat-num { font-family:'Fraunces',serif; font-size:1.5rem; color:#fff; font-weight:700; }
    .hero-stat-label { font-size:10px; color:rgba(255,255,255,.7); letter-spacing:.1em; text-transform:uppercase; margin-top:2px; }

    /* ALBUMS GRID */
    .albums-page { max-width:900px; margin:0 auto; padding:32px 20px 80px; }
    .albums-page-title {
      font-size:13px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
      color:var(--muted); margin-bottom:20px;
    }
    .albums-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap:16px;
    }

    /* ALBUM CARD — Pinterest style */
    .album-card {
      border-radius:20px; overflow:hidden; cursor:pointer;
      background:var(--surface);
      box-shadow:0 2px 12px rgba(0,0,0,.08);
      transition:transform .25s, box-shadow .25s;
      text-decoration:none; display:block;
      border:1px solid var(--border);
    }
    .album-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(26,143,160,.2); }
    .album-card:active { transform:scale(.98); }

    /* Pinterest 4-photo grid */
    .album-card-grid {
      display:grid;
      grid-template-columns:2fr 1fr;
      grid-template-rows:1fr 1fr;
      height:200px; gap:2px;
    }
    .acg-main { grid-row:1/3; overflow:hidden; }
    .acg-sub  { overflow:hidden; }
    .album-card-grid img {
      width:100%; height:100%; object-fit:cover; display:block;
      transition:transform .35s;
    }
    .album-card:hover .album-card-grid img { transform:scale(1.06); }

    /* Card info */
    .album-card-info { padding:12px 16px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .album-card-name { font-size:14px; font-weight:700; color:var(--text); }
    .album-card-date { font-size:11px; color:var(--muted); margin-top:2px; }
    .album-card-badge {
      font-size:11px; font-weight:700; flex-shrink:0;
      color:var(--accent); background:rgba(59,191,176,.1);
      border:1px solid rgba(59,191,176,.2); padding:3px 10px; border-radius:100px;
    }
    /* Loading skeleton */
    .album-card-grid .skeleton {
      background:linear-gradient(90deg, var(--surface-2,#e0eaec) 25%, var(--surface,#f0f7f9) 50%, var(--surface-2,#e0eaec) 75%);
      background-size:200% 100%; animation:shimmer 1.2s infinite;
    }
    body.dark .album-card-grid .skeleton {
      background:linear-gradient(90deg,#1c2430 25%,#21262d 50%,#1c2430 75%);
      background-size:200% 100%;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Animations */
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    /* Theme btn */
    #theme-btn {
      position:fixed; top:16px; right:16px; z-index:999;
      width:40px; height:40px; border-radius:50%;
      background:rgba(255,255,255,.22); backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.35); color:#fff;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .3s; box-shadow:0 2px 12px rgba(0,0,0,.15);
    }
    #theme-btn:hover { background:rgba(255,255,255,.35); transform:scale(1.08); }
    #theme-btn svg { width:18px; height:18px; }

    /* Footer */
    footer {
      text-align:center; padding:28px 20px;
      border-top:1px solid var(--border); color:var(--muted); font-size:13px;
    }
    footer a { color:var(--accent); text-decoration:none; font-weight:600; }

    @media(max-width:600px) {
      .albums-grid { grid-template-columns:1fr; }
      .album-card-grid { height:180px; }
    }
  </style>
</head>
<body class="dark">

<button id="theme-btn" onclick="toggleTheme()" title="Đổi giao diện">
  <svg id="icon-sun" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none">
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <svg id="icon-moon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<!-- HERO -->
<div class="hero">
  <img class="hero-logo" src="https://raw.githubusercontent.com/candimate/candimate.github.io/refs/heads/main/Candimate-Preview__1_-removebg-preview.png" alt="Logo"/>
  <h1>Candimate</h1>
  <p>Khoảnh khắc đẹp nhất của THPT Lộc Hiệp</p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="hero-stat-num" id="total-count">—</div><div class="hero-stat-label">Ảnh</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="album-count">—</div><div class="hero-stat-label">Albums</div></div>
    <div class="hero-stat"><div class="hero-stat-num">Free</div><div class="hero-stat-label">Tải về</div></div>
  </div>
</div>

<!-- ALBUMS GRID -->
<div class="albums-page">
  <p class="albums-page-title">📂 Tất cả album</p>
  <div class="albums-grid" id="albums-grid">
    <!-- rendered by JS -->
  </div>
</div>

<footer>
  Tất cả ảnh thuộc về nhiếp ảnh gia · <a href="privacy.html">Chính sách Quyền riêng tư</a>
</footer>

<script src="js/albums.js"></script>
<script>
  // Theme
  function applyTheme(dark) {
    document.body.classList.toggle('dark', dark);
    document.getElementById('icon-sun').style.display  = dark ? '' : 'none';
    document.getElementById('icon-moon').style.display = dark ? 'none' : '';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }
  function toggleTheme() { applyTheme(!document.body.classList.contains('dark')); }
  (function(){ applyTheme(localStorage.getItem('theme') !== 'light'); })();
</script>
</body>
</html>
